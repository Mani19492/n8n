services:
  client:
    build: ./client
    ports:
      - "3000:3000"
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
      - VITE_N8N_WEBHOOK_URL=http://localhost:5678/webhook-test/forensic
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev
    restart: always

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_CORS_ALLOWED_ORIGINS=*
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - N8N_ENV_VARIABLES_ALLOWLIST=GEMINI_API_KEY
    volumes:
      - test2_n8n_data:/home/node/.n8n
    restart: always

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=forensic_db
    volumes:
      - test2_postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  test2_n8n_data:
  test2_postgres_data:
